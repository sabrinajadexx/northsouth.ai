<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>northsouth/ai — AI Systems for Modern Businesses</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Serif:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; font-family: "IBM Plex Sans", sans-serif; -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
  ::selection { background: #a3e635; color: #0a0a0a; }
  a { transition: opacity .15s; }
  a:hover { opacity: 0.7; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="chat-demo.jsx"></script>
<script type="text/babel" src="page-c-hifi.jsx"></script>

<script type="text/babel">
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "density": "comfy",
    "accent": "lime",
    "display": "pure",
    "heroLayout": "split",
    "dark": false,
    "heroStats": true
  }/*EDITMODE-END*/;

  function App() {
    const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

    return (
      <React.Fragment>
        <CnPage tweaks={tweaks} />

        <TweaksPanel title="Tweaks">
          <TweakSection title="Color">
            <TweakRadio
              label="Accent"
              value={tweaks.accent}
              options={[
                { value: 'lime', label: 'Lime' },
                { value: 'cobalt', label: 'Cobalt' },
                { value: 'sunset', label: 'Sunset' },
                { value: 'mono', label: 'Mono' },
              ]}
              onChange={v => setTweak('accent', v)}
            />
            <TweakToggle
              label="Dark mode"
              value={tweaks.dark}
              onChange={v => setTweak('dark', v)}
            />
          </TweakSection>

          <TweakSection title="Typography">
            <TweakRadio
              label="Accent treatment"
              value={tweaks.display}
              options={[
                { value: 'pure', label: 'Color only' },
                { value: 'italic', label: 'Underlined' },
                { value: 'mixed', label: 'Plex Serif' },
              ]}
              onChange={v => setTweak('display', v)}
            />
            <div style={{ fontSize: 11, color: '#7a6f5c', lineHeight: 1.5, marginTop: 4 }}>
              How emphasized words render. Color only is the cleanest; Underlined adds an accent rule; Plex Serif uses the sibling serif for a slight humanist note.
            </div>
          </TweakSection>

          <TweakSection title="Hero">
            <TweakRadio
              label="Layout"
              value={tweaks.heroLayout}
              options={[
                { value: 'split', label: 'Split + chat' },
                { value: 'centered', label: 'Centered' },
                { value: 'dark', label: 'Dark + chat below' },
              ]}
              onChange={v => setTweak('heroLayout', v)}
            />
            <TweakToggle
              label="Show hero stats"
              value={tweaks.heroStats}
              onChange={v => setTweak('heroStats', v)}
            />
          </TweakSection>

          <TweakSection title="Layout">
            <TweakRadio
              label="Density"
              value={tweaks.density}
              options={[
                { value: 'comfy', label: 'Airy' },
                { value: 'compact', label: 'Compact' },
              ]}
              onChange={v => setTweak('density', v)}
            />
          </TweakSection>
        </TweaksPanel>
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
